<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>묻고 답하기 | 세무사 기출 돌돌이</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=Manrope:wght@500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&family=Orbitron:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="phone">
      <header class="phone-header">
        <button
          type="button"
          class="top-back-btn"
          aria-label="이전"
          onclick="if (window.history.length > 1) { window.history.back(); } else { window.location.href='./index.html'; }"
        >
          <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
            <path
              d="M7.8 7.2V3.8a1 1 0 0 0-1.7-.7L1.8 7.4a1 1 0 0 0 0 1.4l4.3 4.3a1 1 0 0 0 1.7-.7V9.2c5 0 8.9 1.9 11.8 6.5a1 1 0 0 0 1.8-.8C19.4 8.9 14.7 6.8 7.8 7.2z"
            />
          </svg>
        </button>
        <a class="top-home-btn" href="./index.html" aria-label="홈">
          <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
            <path
              d="M12 3.2 3.5 9.8a1 1 0 1 0 1.2 1.6l.8-.6v8.2a1 1 0 0 0 1 1h4.9a1 1 0 0 0 1-1v-4.7h1.2V19a1 1 0 0 0 1 1h4.9a1 1 0 0 0 1-1v-8.2l.8.6a1 1 0 0 0 1.2-1.6L12 3.2z"
            />
          </svg>
        </a>
        <h1 class="title">세무사 기출 돌돌이</h1>
        <p class="title-quote">묻고 답하기</p>
      </header>

      <section class="sub-page qa-page">
        <div class="setup-card">
          <p class="setup-message">묻고 답하기 기능은 아직 구현 중입니다. 해당 서비스는 언제든 예고 없이 종료될 수 있습니다.</p>
          <h2>질문 올리기</h2>
          <p id="qa-message" class="setup-message"></p>
          <div class="qa-form-grid">
            <input id="qa-nickname" class="wrong-input" type="text" maxlength="40" placeholder="닉네임" />
            <input id="qa-title" class="wrong-input" type="text" maxlength="160" placeholder="제목" />
            <select id="qa-subject" class="wrong-input">
              <option value="">과목 선택(선택)</option>
              <option value="재정학">재정학</option>
              <option value="세법학개론">세법학개론</option>
              <option value="회계학개론">회계학개론</option>
              <option value="상법">상법</option>
              <option value="민법">민법</option>
              <option value="행정소송법">행정소송법</option>
            </select>
            <div class="qa-form-inline">
              <input id="qa-year" class="wrong-input" type="number" min="2021" max="2099" placeholder="연도(선택)" />
              <input id="qa-question-no" class="wrong-input" type="number" min="1" max="999" placeholder="문번(선택)" />
            </div>
            <textarea id="qa-body" class="wrong-input qa-body-input" rows="6" placeholder="질문 내용이나 문제 문장을 입력하세요."></textarea>
          </div>
          <button id="qa-submit" class="start-button" type="button">질문 등록</button>
        </div>

        <div class="setup-card">
          <div class="qa-list-head">
            <h2>질문 목록</h2>
            <button id="qa-refresh" class="exam-back" type="button">새로고침</button>
          </div>
          <div id="qa-list" class="qa-list"></div>
        </div>
      </section>

      <footer class="phone-footer">
        <div class="footer-meta">
          <span>Copyright 도로파파</span>
          <a href="https://blog.naver.com/rian4u" target="_blank" rel="noopener noreferrer">blog.naver.com/rian4u</a>
        </div>
        <div class="footer-controls">
          <button type="button" class="skin-nav skin-prev" aria-label="이전 스킨">◀</button>
          <span class="skin-label">스킨 1</span>
          <button type="button" class="skin-nav skin-next" aria-label="다음 스킨">▶</button>
        </div>
      </footer>
    </main>

    <script src="./skin.js"></script>
    <script type="module" src="./qa.js"></script>
  </body>
</html>
