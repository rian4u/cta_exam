<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>OX가 답이다(세무사편)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=Manrope:wght@500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&family=Orbitron:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6QW3VTX0WR"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6QW3VTX0WR');

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1567804202557274" crossorigin="anonymous"></script>
  </head>
  <body>
    <main class="phone">
      <header class="phone-header">
        <button
          type="button"
          class="top-back-btn"
          aria-label="이전"
          onclick="if (window.history.length > 1) { window.history.back(); } else { window.location.href='./index.html'; }"
        >
          <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
            <path
              d="M7.8 7.2V3.8a1 1 0 0 0-1.7-.7L1.8 7.4a1 1 0 0 0 0 1.4l4.3 4.3a1 1 0 0 0 1.7-.7V9.2c5 0 8.9 1.9 11.8 6.5a1 1 0 0 0 1.8-.8C19.4 8.9 14.7 6.8 7.8 7.2z"
            />
          </svg>
        </button>
        <a class="top-home-btn" href="./index.html" aria-label="홈">
          <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
            <path
              d="M12 3.2 3.5 9.8a1 1 0 1 0 1.2 1.6l.8-.6v8.2a1 1 0 0 0 1 1h4.9a1 1 0 0 0 1-1v-4.7h1.2V19a1 1 0 0 0 1 1h4.9a1 1 0 0 0 1-1v-8.2l.8.6a1 1 0 0 0 1.2-1.6L12 3.2z"
            />
          </svg>
        </a>
        <h1 class="title">OX가 답이다(세무사편)</h1>
        <p class="title-quote">문의하기</p>
      </header>

      <section class="sub-page qa-page">
        <!-- 문의 작성 폼 -->
        <div class="setup-card" id="inquiry-form-card">
          <h2>문의 등록</h2>
          <div class="qa-form">
            <input
              id="inq-nickname"
              type="text"
              class="wrong-input"
              placeholder="닉네임 (필수)"
              maxlength="20"
              autocomplete="off"
            />
            <input
              id="inq-title"
              type="text"
              class="wrong-input"
              placeholder="제목 (필수)"
              maxlength="100"
              autocomplete="off"
            />
            <textarea
              id="inq-body"
              class="wrong-input"
              rows="4"
              placeholder="내용 (필수)"
              maxlength="3000"
            ></textarea>
            <div class="qa-optional-row">
              <select id="inq-subject" class="wrong-input">
                <option value="">과목 (선택)</option>
                <option>재정학</option>
                <option>세법학개론</option>
                <option>회계학개론</option>
                <option>상법</option>
                <option>민법</option>
                <option>행정소송법</option>
                <option>국세기본법</option>
                <option>국세징수법</option>
                <option>소득세법</option>
                <option>법인세법</option>
                <option>부가가치세법</option>
                <option>조세범처벌법</option>
              </select>
              <input
                id="inq-year"
                type="number"
                class="wrong-input"
                placeholder="연도"
                min="2000"
                max="2099"
                style="width:90px"
              />
              <input
                id="inq-question-no"
                type="number"
                class="wrong-input"
                placeholder="문제번호"
                min="1"
                max="200"
                style="width:90px"
              />
            </div>
            <p id="inq-message" class="setup-message" style="min-height:1.2em"></p>
            <button id="inq-submit" type="button" class="start-button">문의 등록</button>
          </div>
        </div>

        <!-- 관리자 로그인 (숨김) -->
        <div id="admin-login-card" class="setup-card" style="display:none">
          <h2>관리자</h2>
          <input
            id="admin-key-input"
            type="password"
            class="wrong-input"
            placeholder="관리자 키 입력"
            autocomplete="off"
          />
          <button id="admin-login-btn" type="button" class="exam-back" style="margin-top:8px">로그인</button>
          <button id="admin-logout-btn" type="button" class="exam-back" style="margin-top:8px;display:none">로그아웃</button>
          <p id="admin-status" class="setup-message" style="min-height:1.2em"></p>
        </div>

        <!-- 문의 목록 -->
        <div class="setup-card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <h2 style="margin:0">문의 목록</h2>
            <button id="inq-refresh" type="button" class="exam-back">새로고침</button>
          </div>
          <p id="inq-list-message" class="setup-message" style="min-height:1em"></p>
          <div id="inq-list"></div>
        </div>
      </section>

      <footer class="phone-footer">
        <div class="footer-meta">
          <span>Copyright 도로파파</span>
          <a href="https://blog.naver.com/rian4u" target="_blank" rel="noopener noreferrer">blog.naver.com/rian4u</a>
        </div>
        <div class="footer-controls">
          <button type="button" class="skin-nav skin-prev" aria-label="이전 스킨">◀</button>
          <span class="skin-label">스킨 1</span>
          <button type="button" class="skin-nav skin-next" aria-label="다음 스킨">▶</button>
        </div>
      </footer>
    </main>

    <script src="./skin.js"></script>
    <script src="./contact.js"></script>
  </body>
</html>
