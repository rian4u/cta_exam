<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>모의고사 | OX가 답이다(세무사편)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=Manrope:wght@500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&family=Orbitron:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["\\(", "\\)"], ["$", "$"]],
          displayMath: [["\\[", "\\]"]],
          processEscapes: true,
        },
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="phone mock-root">
      <header class="phone-header">
        <button
          type="button"
          class="top-back-btn"
          aria-label="이전"
          onclick="if (window.history.length > 1) { window.history.back(); } else { window.location.href='./index.html'; }"
        >
          <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
            <path
              d="M7.8 7.2V3.8a1 1 0 0 0-1.7-.7L1.8 7.4a1 1 0 0 0 0 1.4l4.3 4.3a1 1 0 0 0 1.7-.7V9.2c5 0 8.9 1.9 11.8 6.5a1 1 0 0 0 1.8-.8C19.4 8.9 14.7 6.8 7.8 7.2z"
            />
          </svg>
        </button>
        <a class="top-home-btn" href="./index.html" aria-label="홈">
          <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
            <path
              d="M12 3.2 3.5 9.8a1 1 0 1 0 1.2 1.6l.8-.6v8.2a1 1 0 0 0 1 1h4.9a1 1 0 0 0 1-1v-4.7h1.2V19a1 1 0 0 0 1 1h4.9a1 1 0 0 0 1-1v-8.2l.8.6a1 1 0 0 0 1.2-1.6L12 3.2z"
            />
          </svg>
        </a>
        <h1 class="title">OX가 답이다(세무사편)</h1>
        <p class="title-quote">될 때까지 하지 않아서 되지 않는 것이다</p>
      </header>

      <section class="exam-content">
        <div id="setup-panel" class="setup-panel">
          <div class="setup-card">
            <h2>과목 선택</h2>
            <div id="subject-grid" class="choice-grid"></div>
          </div>

          <div class="setup-card">
            <h2>기출연도 선택</h2>
            <div id="year-grid" class="choice-grid"></div>
          </div>

          <p id="setup-message" class="setup-message"></p>

          <div class="start-wrap">
            <button id="start-button" class="start-button" disabled>시작하기</button>
          </div>
        </div>

        <div id="exam-panel" class="exam-panel hidden">
          <div class="exam-top">
            <span id="exam-label" class="exam-label"></span>
            <span id="exam-dday" class="exam-dday"></span>
          </div>

          <div id="status-grid" class="status-grid"></div>

          <article class="question-panel">
            <div class="question-head">
              <h2 id="question-no" class="question-no"></h2>
              <div class="question-tools">
                <div id="traffic-group" class="traffic-group" aria-label="오답노트 중요도">
                  <button type="button" class="traffic-btn traffic-red" data-traffic="red" aria-label="빨강"></button>
                  <button type="button" class="traffic-btn traffic-yellow" data-traffic="yellow" aria-label="노랑"></button>
                  <button type="button" class="traffic-btn traffic-green" data-traffic="green" aria-label="초록"></button>
                  <button type="button" class="traffic-btn traffic-gray" data-traffic="gray" aria-label="회색"></button>
                </div>
                <button id="note-open-button" type="button" class="note-open-btn" aria-label="코멘트 작성">✎</button>
              </div>
            </div>
            <div id="question-stem" class="question-stem"></div>
          </article>

          <article class="option-panel">
            <h3 class="option-title">보기</h3>
            <div id="option-list" class="option-list"></div>
          </article>

          <div class="exam-actions">
            <button id="explain-button" class="explain-button">해설보기</button>
            <button id="calc-toggle" class="calc-action-btn" type="button">계산기</button>
          </div>

          <article id="explain-popup" class="explain-popup hidden" aria-live="polite">
            <div class="explain-popup-head">
              <button id="explain-close" type="button" class="explain-close-btn" aria-label="해설 닫기">닫기</button>
            </div>
            <div id="explain-popup-body" class="explain-popup-body"></div>
          </article>

          <article id="note-popup" class="note-popup hidden" aria-label="코멘트 작성 팝업">
            <div class="note-popup-head">
              <strong>코멘트</strong>
              <button id="note-close-button" type="button" class="note-close-btn" aria-label="코멘트 닫기">닫기</button>
            </div>
            <textarea id="note-textarea" class="note-textarea" rows="6" placeholder="오답노트 코멘트를 입력하세요."></textarea>
            <div class="note-popup-actions">
              <button id="note-save-button" type="button" class="note-save-btn">저장</button>
              <button id="note-clear-button" type="button" class="note-clear-btn">삭제</button>
            </div>
          </article>
        </div>
      </section>
      <aside id="calc-panel" class="calc-panel hidden" aria-label="계산기">
        <div class="calc-head">
          <strong>계산기</strong>
          <button id="calc-close" class="calc-close" type="button">닫기</button>
        </div>
        <input id="calc-display" class="calc-display" type="text" value="0" readonly />
        <div class="calc-grid">
          <button class="calc-btn memory" data-action="mc" type="button">MC</button>
          <button class="calc-btn memory" data-action="mr" type="button">MR</button>
          <button class="calc-btn memory" data-action="mplus" type="button">M+</button>
          <button class="calc-btn memory" data-action="mminus" type="button">M-</button>

          <button class="calc-btn memory" data-action="gt" type="button">GT</button>
          <button class="calc-btn clear" data-action="clear" type="button">C</button>
          <button class="calc-btn clear" data-action="back" type="button">DEL</button>
          <button class="calc-btn operator" data-value="/" type="button">÷</button>

          <button class="calc-btn" data-value="7" type="button">7</button>
          <button class="calc-btn" data-value="8" type="button">8</button>
          <button class="calc-btn" data-value="9" type="button">9</button>
          <button class="calc-btn operator" data-value="*" type="button">×</button>

          <button class="calc-btn" data-value="4" type="button">4</button>
          <button class="calc-btn" data-value="5" type="button">5</button>
          <button class="calc-btn" data-value="6" type="button">6</button>
          <button class="calc-btn operator" data-value="-" type="button">-</button>

          <button class="calc-btn" data-value="1" type="button">1</button>
          <button class="calc-btn" data-value="2" type="button">2</button>
          <button class="calc-btn" data-value="3" type="button">3</button>
          <button class="calc-btn operator" data-value="+" type="button">+</button>

          <button class="calc-btn" data-value="0" type="button">0</button>
          <button class="calc-btn" data-value="00" type="button">00</button>
          <button class="calc-btn" data-value="." type="button">.</button>
          <button class="calc-btn eval" data-action="equals" type="button">=</button>
        </div>
      </aside>

      <footer class="phone-footer">
        <div class="footer-meta">
          <span>Copyright 도로파파</span>
          <a href="https://blog.naver.com/rian4u" target="_blank" rel="noopener noreferrer">blog.naver.com/rian4u</a>
        </div>
        <div class="footer-controls">
          <button type="button" class="skin-nav skin-prev" aria-label="이전 스킨">◀</button>
          <span class="skin-label">스킨 1</span>
          <button type="button" class="skin-nav skin-next" aria-label="다음 스킨">▶</button>
        </div>
      </footer>
    </main>

    <script src="./skin.js"></script>
    <script src="./local-user-data.js"></script>
    <script type="module" src="./mock-exam.js"></script>
  </body>
</html>
