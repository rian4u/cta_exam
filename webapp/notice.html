<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>공지사항 | OX가 답이다(세무사편)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=Manrope:wght@500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&family=Orbitron:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="phone">
      <header class="phone-header">
        <button
          type="button"
          class="top-back-btn"
          aria-label="이전"
          onclick="if (window.history.length > 1) { window.history.back(); } else { window.location.href='./index.html'; }"
        >
          <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
            <path
              d="M7.8 7.2V3.8a1 1 0 0 0-1.7-.7L1.8 7.4a1 1 0 0 0 0 1.4l4.3 4.3a1 1 0 0 0 1.7-.7V9.2c5 0 8.9 1.9 11.8 6.5a1 1 0 0 0 1.8-.8C19.4 8.9 14.7 6.8 7.8 7.2z"
            />
          </svg>
        </button>
        <a class="top-home-btn" href="./index.html" aria-label="홈">
          <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
            <path
              d="M12 3.2 3.5 9.8a1 1 0 1 0 1.2 1.6l.8-.6v8.2a1 1 0 0 0 1 1h4.9a1 1 0 0 0 1-1v-4.7h1.2V19a1 1 0 0 0 1 1h4.9a1 1 0 0 0 1-1v-8.2l.8.6a1 1 0 0 0 1.2-1.6L12 3.2z"
            />
          </svg>
        </a>
        <h1 class="title">OX가 답이다(세무사편)</h1>
        <p class="title-quote">공지사항</p>
      </header>

      <section class="sub-page">
        <div class="setup-card notice-board-card">
          <h2>공지 게시판</h2>
          <p id="notice-message" class="setup-message"></p>
          <ul id="notice-list" class="notice-list"></ul>
        </div>

        <div id="notice-admin-card" class="setup-card notice-admin-card hidden">
          <h2>공지 작성 (관리자)</h2>
          <input id="notice-admin-key" class="wrong-input" type="password" placeholder="관리자 키" />
          <input id="notice-title" class="wrong-input" type="text" maxlength="120" placeholder="제목" />
          <textarea id="notice-body" class="wrong-input notice-body" rows="8" placeholder="내용"></textarea>
          <div class="notice-admin-actions">
            <label class="notice-publish-label">
              <input id="notice-published" type="checkbox" checked />
              게시
            </label>
            <button id="notice-save" class="start-button" type="button">등록</button>
          </div>
        </div>
      </section>

      <footer class="phone-footer">
        <div class="footer-meta">
          <span>Copyright 도로파파</span>
          <a href="https://blog.naver.com/rian4u" target="_blank" rel="noopener noreferrer">blog.naver.com/rian4u</a>
        </div>
        <div class="footer-controls">
          <button type="button" class="skin-nav skin-prev" aria-label="이전 스킨">◀</button>
          <span class="skin-label">스킨 1</span>
          <button type="button" class="skin-nav skin-next" aria-label="다음 스킨">▶</button>
        </div>
      </footer>
    </main>

    <script src="./skin.js"></script>
    <script type="module" src="./notice.js"></script>
  </body>
</html>
